# GFS Desktop App - Database Configuration
# Copy this file to db.properties and fill in your credentials.
# NEVER commit db.properties to version control.

# ─────────────────────────────────────────────────────────────────
# App database (gfs_desktop_app) — charset: utf8mb4
# ─────────────────────────────────────────────────────────────────
app.db.url=jdbc:mysql://127.0.0.1:3306/gfs_desktop_app?useSSL=false&serverTimezone=Asia/Singapore&useUnicode=true&characterEncoding=UTF-8

app.db.username=root
app.db.password=leesupri491

# ─────────────────────────────────────────────────────────────────
# Reports database (db_gundaling) — charset: latin1
#
# characterEncoding=ISO-8859-1 tells the JDBC driver to treat all
# bytes from MySQL as Latin-1 instead of UTF-8.
# This prevents garbled text (mojibake) on any accented or special
# characters stored in a latin1 database.
#
# If you ever migrate db_gundaling to utf8mb4, change this line to:
#   characterEncoding=UTF-8
# ─────────────────────────────────────────────────────────────────
reports.db.url=jdbc:mysql://127.0.0.1:3306/db_gundaling?useSSL=false&serverTimezone=Asia/Singapore&useUnicode=true&characterEncoding=UTF-8

reports.db.username=root
reports.db.password=leesupri491
